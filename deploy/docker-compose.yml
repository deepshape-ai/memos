# Production deployment template for deepshape/memos fork.
# Copy to server, adjust image tag, then: docker compose up -d
services:
  memos:
    image: deepshape/memos:0.26.2-ds.20260311
    container_name: memos
    restart: unless-stopped
    ports:
      - "5230:5230"
    volumes:
      - ./data:/var/opt/memos
    environment:
      - TZ=Asia/Shanghai
